<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feebas Particle Simulator</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <h1>Feebas Particle Simulator</h1>
          <p>Local canvas stage</p>
        </div>
        <div class="controls" aria-label="Particle brush controls">
          <div class="tool-group" role="group" aria-label="Particle type">
            <button class="tool-button is-selected" type="button" data-particle="dirt">Dirt</button>
            <button class="tool-button" type="button" data-particle="grass">Grass</button>
          </div>
          <button class="tool-button action-button" type="button" data-action="step">Step</button>
          <span class="status" aria-label="Simulator status">Dirt selected</span>
        </div>
      </header>

      <section class="canvas-panel" aria-label="Simulation canvas">
        <canvas id="simulation-canvas"></canvas>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
